version: 2

# Keep both runtime deps (pyproject) and CI actions current. We
# review and merge weekly; security updates fire as soon as they
# show up regardless of schedule.

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      pydantic:
        patterns:
          - "pydantic*"
      dev-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(actions)"
