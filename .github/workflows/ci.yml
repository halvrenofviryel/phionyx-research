name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR / branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show resolved versions
        run: |
          python --version
          pip --version
          pip list | grep -E "^(phionyx-core|pydantic|numpy|PyYAML)" || true

      - name: Lint (ruff)
        run: ruff check phionyx_core

      - name: Type check (mypy — strategic modules)
        # Gradual mypy rollout. Each wave locks a set of modules at zero
        # errors so they cannot regress. Other modules are tracked for a
        # later wave behind their own CI gate as each becomes clean.
        #
        # `--follow-imports=silent` is the gating mechanism: mypy still
        # *reads* transitive imports (so it can resolve types) but
        # suppresses errors that originate outside the listed paths.
        #
        # Wave 1 (locked): governance, physics, contracts/v4, contracts/telemetry
        # Wave 2 (locked): config, ports, contracts (rest), evaluation, context,
        #                  metrics, planning, causality
        # Wave 3 (locked): cep
        # Wave 4 (locked): state, pipeline
        # Wave 5 (locked): memory, meta, monitoring, profiles
        run: |
          mypy --follow-imports=silent \
            phionyx_core/governance \
            phionyx_core/physics \
            phionyx_core/contracts \
            phionyx_core/config \
            phionyx_core/ports \
            phionyx_core/evaluation \
            phionyx_core/context \
            phionyx_core/metrics \
            phionyx_core/planning \
            phionyx_core/causality \
            phionyx_core/cep \
            phionyx_core/state \
            phionyx_core/pipeline \
            phionyx_core/memory \
            phionyx_core/meta \
            phionyx_core/monitoring \
            phionyx_core/profiles

      - name: Smoke import
        run: |
          python -c "import phionyx_core; print('phionyx_core', phionyx_core.__version__)"
          python -c "from phionyx_core import EchoState2, calculate_phi_v2_1, PipelineBlock"
          python -c "from phionyx_core.governance.kill_switch import KillSwitch; print('kill switch', KillSwitch().state.value)"

      - name: Run pytest (tests/core)
        run: pytest tests/core -q --tb=short

      - name: Run pytest (tests/contract)
        run: pytest tests/contract -q --tb=short

      - name: Run pytest (tests/benchmarks)
        run: pytest tests/benchmarks -q --tb=short

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      # Mirrors what a user gets from `pip install phionyx-core` once the
      # wheel is on PyPI. Catches packaging mistakes that an editable
      # install (used in the test job above) cannot surface.
      - name: Smoke install + import from built wheel
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install --quiet dist/phionyx_core-*.whl
          /tmp/wheel-smoke/bin/python -c "
          import phionyx_core
          from phionyx_core import EchoState2, calculate_phi_v2_1
          from phionyx_core.governance.kill_switch import KillSwitch
          from phionyx_core.contracts.telemetry import get_canonical_blocks
          assert phionyx_core.__version__, 'package __version__ should be set'
          assert len(get_canonical_blocks()) == 46
          s = EchoState2(A=0.5, V=0.3, H=0.4)
          r = calculate_phi_v2_1(valence=s.V, arousal=s.A, amplitude=5.0,
              time_delta=0.1, gamma=0.15, stability=s.stability,
              entropy=s.H, w_c=0.6, w_p=0.4)
          assert r['phi'] > 0
          assert KillSwitch().state.value == 'armed'
          print('wheel smoke: ok')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
