# === CAMPAIGNS: AGI-Focused PRE Experiment Campaigns ===
# These define structured sweep strategies for Level 3.5 gate problems.
# Each campaign targets a subset of surfaces with AGI-relevant metrics.

campaigns:
  - id: edge_discovery_campaign
    label: "Causal Edge Discovery"
    priority: 1
    agi_impact_weight: 0.40
    agi_target: "Level 3.5 — Causal Discovery"
    mind_loop_stages: ["update_world_model", "plan"]
    agi_domains: ["causality"]
    description: "Sweep causality parameters to improve CF Self-Coherence — enriched graph achieved 0.8097"
    success_metric: "counterfactual_self_coherence"
    success_threshold: 0.80
    current_baseline: 0.8097
    target_surfaces:
      - file: "phionyx_core/causality/causal_graph.py"
        parameters: ["default_confidence", "default_strength", "pc_alpha", "pc_min_observations", "pc_max_conditioning_size"]
      - file: "phionyx_core/causality/intervention.py"
        parameters: ["attenuation_rate", "min_effect_threshold", "max_propagation_depth"]
      - file: "phionyx_core/causality/counterfactual.py"
        parameters: ["cf_attenuation_rate", "cf_min_effect"]
      - file: "phionyx_core/causality/root_cause.py"
        parameters: ["rca_attenuation_rate", "rca_max_depth", "rca_min_likelihood"]
    constraints:
      - "All causality parameters must maintain existing test pass rates"
      - "CF Self-Coherence must improve without reducing other proxy scores"
    estimated_experiments: 65

  - id: goal_persistence_sweep
    label: "Goal Persistence Cross-Session"
    priority: 2
    agi_impact_weight: 0.35
    agi_target: "Level 3.5 — Goal Persistence"
    mind_loop_stages: ["plan", "reflect"]
    agi_domains: ["planning", "memory"]
    description: "Optimize planning and memory parameters for cross-session goal load rate >= 80%"
    success_metric: "cross_session_goal_load_rate"
    success_threshold: 0.80
    current_baseline: 0.0
    target_surfaces:
      - file: "phionyx_core/planning/goal_decomposer.py"
        parameters: ["max_sub_goals", "default_complexity"]
      - file: "phionyx_core/memory/consolidation.py"
        parameters: ["similarity_threshold", "promotion_access_threshold"]
      - file: "phionyx_core/memory/forgetting.py"
        parameters: ["suppression_factor", "min_intensity"]
    constraints:
      - "Goal decomposition must still pass all existing tests"
      - "Memory consolidation must not lose existing semantic memories"
    estimated_experiments: 40

  - id: learning_feedback_loop
    label: "Learning Feedback Loop"
    priority: 3
    agi_impact_weight: 0.25
